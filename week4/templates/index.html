<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="{{ url_for('static', path='/styles.css') }}" rel="stylesheet">
</head>
<body>
    <header class="navbar">歡迎光臨，請輸入信箱密碼</header>
    <section class="type1">

        <h3>登錄系統</h3>
        <form action="/login" method="post" id="loginForm">
            <div class="form-bar"><label for="">信箱</label><input type="email" name="email"></div>
            <div class="form-bar"><label for="">密碼</label><input type="password" name="password"></div>
            <div class="form-bar"><label for="">同意條款</label><input type="checkbox" name="cb" id="agreeCb"></div>          
            <button id="agt">登入</button>
        </form>
    </section>
    <hr>
    <section class="type1">
        <h3>取得旅館資訊</h3>
        <form action="/login" id="hotelForm">
            <div class="form-bar"><label>編號</label><input type="text" id="hotelId"></div> <!-- label的for -->   
            <button id="ght">取得</button>
        </form>
    </section>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const checkbox = document.getElementById('agreeCb');
            if (!checkbox.checked) {
                alert('請勾選同意條款'); 
                return;
            }

            const formData = new FormData(this);

            fetch('/login', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/member';
                } else {
                    window.location.href = '/ohoh?msg=' + data.msg;
                }
            })
        });

        document.getElementById('hotelForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const inputVal = document.getElementById('hotelId').value;

            const num = Number(inputVal);
            const isPositiveInt = Number.isInteger(num) && num > 0;
            
            if (!isPositiveInt) {
                alert('請輸入正整數');
            } else {
                window.location.href = '/hotel/' + inputVal;
            }
        });
    </script>
</body>
</html>
