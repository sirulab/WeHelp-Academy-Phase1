//屬性: 姓名, x, y -> 計算和別人的距離, 計算在線哪邊

function func1(targetName) {

    function Point(name, x, y) {
        this.name = name;
        this.x = x;
        this.y = y;
    }

    var pointList = [
        new Point("辛巴", -3, 3),
        new Point("悟空", 0, 0),
        new Point("弗利沙", 4, -1),
        new Point("特南克斯", 1, -2),
        new Point("丁滿", -1, 4),
        new Point("貝吉塔", -4, -1)
    ];

    var targetPoint;
    for (var i = 0; i < pointList.length; i++) {
        if (pointList[i].name === targetName) {
            targetPoint = pointList[i];
            break;
        }
    }

    var targetSide = 1.2 * targetPoint.x + targetPoint.y - 1.8;
    var disList = [];
    var nameList = []; //報錯: 少一個人

    for (var i = 0; i < pointList.length; i++) {
        var cur = pointList[i];
        
        if (cur.name === targetName) { // 先跳過自己 === vs. python ==
            continue; 
        }

        var dis = Math.abs(targetPoint.x - cur.x) + Math.abs(targetPoint.y - cur.y);

        var currentSide = 1.2 * cur.x + cur.y - 1.8;
        
        if (targetSide * currentSide < 0) { 
            dis += 2; 
        }

        disList.push(dis);
        nameList.push(cur.name);
    }

    var maxDis = Math.max(...disList); //報錯: 解包
    var minDis = Math.min(...disList);

    var furthest = [];
    var nearest = [];

    for (var i = 0; i < disList.length; i++) {
        if (disList[i] === maxDis) {
            furthest.push(nameList[i]);
        }
        if (disList[i] === minDis) {
            nearest.push(nameList[i]);
        }
    }
    console.log("最遠" + furthest.join("、") + "；最近" + nearest.join("、")); 
} //報錯: 大括號數量

func1("辛巴"); // print 最遠弗利沙；最近丁滿、⾙吉塔

function Service(name, r, c) {
    var s = {}; //報錯: 把Service放在func2裡，timeslot不能book
    s.name = name;
    s.r = r;
    s.c = c;
    s.timeslot = [];

    for (var i = 1; i <= 24; i++) {
        s.timeslot.push(i);
    }
    
    return s;
}

function func2(ss, start, end, criteria) {
    if (!ss[0].timeslot) {
        for (var i = 0; i < ss.length; i++) { //報錯: 之後修改會變短
            ss[i] = Service(ss[i].name, ss[i].r, ss[i].c); 
        }
    }

    var cf = "";
    var op = "";
    var tv = 0;

    if (criteria[0] === "c") {
        cf = "c";
        if (criteria.includes(">=")) {
            op = ">=";
            tv = parseInt(criteria.split(">=")[1]);
        } else if (criteria.includes("<=")) {
            op = "<=";
            tv = parseInt(criteria.split("<=")[1]);
        } else {
            op = "=";
            tv = parseInt(criteria.split("=")[1]);
        }
    } else if (criteria[0] === "r") {
        cf = "r";
        if (criteria.includes(">=")) {
            op = ">=";
            tv = parseFloat(criteria.split(">=")[1]);
        } else if (criteria.includes("<=")) {
            op = "<=";
            tv = parseFloat(criteria.split("<=")[1]);
        } else {
            op = "=";
            tv = parseFloat(criteria.split("=")[1]);
        }
    } else if (criteria.includes("name")) {
        cf = "name";
        op = "=";
        tv = criteria.split("=")[1];
    } else {
        console.log("Sorry");
        return;
    }

    var candidates = [];

    for (var i = 0; i < ss.length; i++) {
        var s = ss[i];
        var val = s[cf];
        var match = false;

        if (op === "=" && val == tv) {
            match = true;
        } else if (op === ">=" && val >= tv) {
            match = true;
        } else if (op === "<=" && val <= tv) {
            match = true;
        }

        if (match) {
            if (cf !== "name") {
                var diff = Math.abs(val - tv);
                candidates.push({ diff: diff, service: s }); //格式
            }
            else {
                candidates.push({ diff: 0, service: s });
            }
        }
    }
    if (candidates.length === 0) {
        console.log("Sorry");
        return;
    }

    candidates.sort((a, b) => a.diff - b.diff); //學用一下JS的sort

    for (var i = 0; i < candidates.length; i++) {
        var s = candidates[i].service;
        var availList = s.timeslot;
        var canBook = true;

        for (var t = start; t < end; t++) {
            if (availList.indexOf(t) === -1) {
                canBook = false;
                break; //報錯: 還是不太會用 break和return
            }
        }

        if (canBook) {
            for (var t = start; t < end; t++) {
                var idx = availList.indexOf(t);
                availList.splice(idx, 1); 
            }
            console.log(s.name);
            return;
        }
    }

    console.log("Sorry");
}

function func4(sp, stat, n){
    //class Cart屬性(用index當名稱)-> stat屬性2(車廂是否可用)list放入-> sp屬性1(剩餘座位)list放入
    //loop through 屬性2 可用的-> 運算n - Cart.屬性1 絕對值越小越好 sort-> 若相同，只選一個 -> 印出車廂名
    function Cart(index, space, avail){
        this.index = index;
        this.space = space;
        this.avail = (avail=== "0") //01直接轉換true or false
    }
    var cartList = []
    for(var i = 0; i < sp.length; i++){
        var obj = new Cart(i, sp[i], stat[i]) //sp和stat 讀取方式相同?
        cartList.push(obj);
    }

    var availList = [];
    var diffList = []
    for(var i = 0; i < cartList.length; i++){
        var obj = cartList[i] 
        if (!obj.avail){ 
            continue;
        }
        var diff = Math.abs(obj.space - n);
        availList.push(obj);
        diffList.push(diff);
    }
    var minDiff = Math.min(...diffList); //不接受整個陣列當作參數
    var candidates = [];

    for (var i = 0; i < availList.length; i++) {
        if (diffList[i] === minDiff) {
            candidates.push(availList[i]);
        }
    }

    var bestCart = candidates[0];
    for (var i = 1; i < candidates.length; i++) {
        var currentObj = candidates[i];
        }

    console.log(bestCart.index);
}
